function cekNilai() {
    const inputPin = document.getElementById("pinInput").value.trim();
    const resultBox = document.getElementById("resultBox");
    const errorMsg = document.getElementById("errorMessage");
    const esaiList = document.getElementById("esaiList");
    const esaiBox = document.getElementById("esaiBox");

    if (dataSiswa[inputPin]) {
        errorMsg.style.display = "none";
        
        document.getElementById("resNama").innerText = dataSiswa[inputPin].nama;
        document.getElementById("resL").innerText = dataSiswa[inputPin].l;
        document.getElementById("resR").innerText = dataSiswa[inputPin].r;
        document.getElementById("resW").innerText = dataSiswa[inputPin].w;
        document.getElementById("resTotal").innerText = dataSiswa[inputPin].t;
        
        esaiList.innerHTML = "";
        const esaiData = dataSiswa[inputPin].esai;
        
        if (esaiData && esaiData.length > 0) {
            esaiBox.style.display = "block";
            esaiData.forEach(item => {
                const div = document.createElement("div");
                div.className = "esai-item";
                div.innerHTML = `
                    <div><span class="soal-num">No. Soal ${item.no}</span></div>
                    ❌ Salah: <span class="wrong">${item.w}</span><br>
                    ✅ Koreksi: <span class="correct">${item.c}</span><br>
                    <span class="note">💡 Catatan: ${item.n}</span>
                `;
                esaiList.appendChild(div);
            });
        } else {
            esaiBox.style.display = "none";
        }

        resultBox.style.display = "block";
    } else {
        resultBox.style.display = "none";
        errorMsg.style.display = "block";
    }
}
</script>
